<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Kyvera Klub - Official Discord Server Invite</title>
    <meta property="og:title" content="Kyvera Klub - Official Discord Server Invite" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="A radiant rift to realms unknown." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Katari Kityama">
    <meta name="theme-color" content="#ff2f6c">
    <meta name="twitter:card" content="summary_large_image">
    
    <meta name='robots' content='index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1'/>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Kyvera Klub - Official Discord Server Invite",
      "url": "https://discord.gg/kyvera",
      "logo": "https://i.imgur.com/4NLuPKL.png",
      "image": {
        "@type": "ImageObject",
        "url": "https://i.imgur.com/Ygqlk7h.png",
        "width": "1700",
        "height": "700"
      },
      "sameAs": [
        "https://twitter.com/Katari_Kityama",
        "https://www.deviantart.com/katari-kityama",
        "https://www.reddit.com/user/Katari_2000"
      ]
    }
  </script>
    
  <script>
    var imageLinks = [
    "https://i.imgur.com/geyszy5.png",
    "https://i.imgur.com/Ygqlk7h.png"
    ];
    var randomIndex = Math.floor(Math.random() * imageLinks.length);
    var randomImageLink = imageLinks[randomIndex];
    document.querySelector('meta[property="og:image"]').setAttribute("content", randomImageLink);
  </script>
  </head>

  <body>
    <h1>Redirecting...</h1>
     <div id="counter">5</div>
    <script>
        setInterval(function() {
            var div = document.querySelector("#counter");
            var count = div.textContent * 1 - 1;
            div.textContent = count;
            if (count <= 0) {
                window.location.replace("https://discord.gg/kyvera");
            }
        }, 1000);
    </script>
  </body>
</html>
