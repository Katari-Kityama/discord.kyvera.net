<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Kyvera Klub - Official Discord Server Invite</title> 
    <meta property="og:image" content="">
    <script>
     var xhr = new XMLHttpRequest();
      xhr.open('GET', 'https://kyvera.000webhostapp.com/randombanner.php', true);
      xhr.onreadystatechange = function() {
        if (this.readyState === 4 && this.status === 200) {
            var metaTag = document.querySelector('meta[property="og:image"]');
            metaTag.setAttribute('content', this.responseText);
        }
      };
      xhr.send();
    </script>

    <meta property="og:title" content="Kyvera Klub - Official Discord Server Invite" />
    <meta property="og:type" content="website" />

  </head>

  <body>
    <h1>Redirecting...</h1>
     <div id="counter">5</div>
    <script>
        setInterval(function() {
            var div = document.querySelector("#counter");
            var count = div.textContent * 1 - 1;
            div.textContent = count;
            if (count <= 0) {
                window.location.replace("https://discord.gg/kyvera");
            }
        }, 1000);
    </script>
